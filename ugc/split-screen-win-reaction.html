<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UGC Animatic — Split-Screen Win Reaction</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body { font-family:"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background:#000; display:flex; align-items:center; justify-content:center; }

  #stage { position:fixed; inset:0; overflow:hidden; background:#000; display:flex; align-items:center; justify-content:center; }
  #board { position:relative; width:405px; height:720px; flex:none; overflow:hidden; transform-origin:center center; background:#0b0b12; border-radius:6px; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  #shake { position:absolute; inset:-16px; animation:hand 6s ease-in-out infinite; }
  @keyframes hand {
    0%{transform:translate(0,0) rotate(0)} 25%{transform:translate(2px,-2px) rotate(.25deg)}
    50%{transform:translate(-2px,1px) rotate(-.2deg)} 75%{transform:translate(2px,2px) rotate(.18deg)} 100%{transform:translate(0,0) rotate(0)}
  }
  .vignette { position:absolute; inset:0; z-index:8; pointer-events:none; box-shadow:inset 0 0 120px rgba(0,0,0,.55); }
  .grain { position:absolute; inset:0; z-index:8; pointer-events:none; opacity:.045; background-image:radial-gradient(#fff 1px,transparent 1px); background-size:3px 3px; mix-blend-mode:overlay; }

  /* ---------- TOP: reaction ---------- */
  #top { position:absolute; left:0; right:0; top:0; height:50%; overflow:hidden; }
  #topbg { position:absolute; inset:-6%; background:radial-gradient(ellipse at 50% 32%, #4a3a78, #221a40 62%, #14102a);
    animation:ken 14s ease-in-out infinite alternate; }
  @keyframes ken { 0%{transform:scale(1)} 100%{transform:scale(1.12)} }
  .ringlight { position:absolute; top:30px; left:50%; transform:translateX(-50%); width:230px; height:230px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,228,170,.35), transparent 62%); filter:blur(6px); animation:rl 3.4s ease-in-out infinite; }
  @keyframes rl { 0%,100%{opacity:.6; transform:translateX(-50%) scale(1)} 50%{opacity:1; transform:translateX(-50%) scale(1.06)} }
  .rec { position:absolute; top:14px; left:14px; display:flex; align-items:center; gap:6px; font-size:12px; font-weight:800; color:#fff; letter-spacing:1px; z-index:4; text-shadow:0 1px 3px rgba(0,0,0,.7); }
  .rec .dot { width:9px; height:9px; border-radius:50%; background:#ff3b3b; box-shadow:0 0 8px #ff3b3b; animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50%{opacity:.2} }
  .live2 { position:absolute; top:13px; right:14px; z-index:4; font-size:10px; font-weight:900; letter-spacing:1px; color:#fff; background:rgba(255,59,59,.9); padding:3px 8px; border-radius:5px; }
  .avatar { position:absolute; top:48px; left:50%; transform:translateX(-50%); width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle at 38% 30%, #ffe7bd, #f0b878 70%, #e09a55); display:flex; align-items:center; justify-content:center; font-size:80px;
    box-shadow:0 16px 44px rgba(0,0,0,.55), inset 0 -8px 18px rgba(150,90,40,.35), inset 0 0 0 5px rgba(255,255,255,.3); z-index:3;
    animation:breathe 3.6s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.035)} }
  .avatar.pop { animation:apop .45s cubic-bezier(.2,.9,.3,1.6); }
  @keyframes apop { 0%{transform:translateX(-50%) scale(1)} 45%{transform:translateX(-50%) scale(1.16) rotate(-2deg)} 100%{transform:translateX(-50%) scale(1)} }
  .handle { position:absolute; top:200px; left:50%; transform:translateX(-50%); color:#fff; font-size:13px; font-weight:700; opacity:.9; z-index:3; text-shadow:0 1px 3px rgba(0,0,0,.6); display:flex; align-items:center; gap:5px; }
  .handle .v { color:#5ac8ff; font-size:13px; }
  .wave { position:absolute; top:226px; left:50%; transform:translateX(-50%); display:flex; gap:3px; align-items:flex-end; height:14px; z-index:3; opacity:.8; }
  .wave i { width:3px; background:#9fe0ff; border-radius:2px; animation:wv .9s ease-in-out infinite; }
  .wave i:nth-child(2){animation-delay:.1s} .wave i:nth-child(3){animation-delay:.2s} .wave i:nth-child(4){animation-delay:.3s}
  .wave i:nth-child(5){animation-delay:.15s} .wave i:nth-child(6){animation-delay:.05s} .wave i:nth-child(7){animation-delay:.25s}
  @keyframes wv { 0%,100%{height:4px} 50%{height:14px} }
  .vo { position:absolute; left:16px; right:16px; bottom:16px; z-index:4; text-align:center; }
  .vo span { display:inline; background:rgba(0,0,0,.66); color:#fff; font-size:16px; font-weight:700; line-height:1.5; padding:5px 10px; border-radius:7px;
    box-decoration-break:clone; -webkit-box-decoration-break:clone; }
  .vo.in span { animation:voin .4s ease; }
  @keyframes voin { 0%{opacity:0; transform:translateY(8px)} 100%{opacity:1; transform:translateY(0)} }

  /* ---------- BOTTOM: gameplay ---------- */
  #bot { position:absolute; left:0; right:0; bottom:0; height:50%; overflow:hidden;
    background:radial-gradient(ellipse 120% 95% at 50% 38%, #2a8f5c, #0d4e30 68%, #06301d); }
  #bot::before { content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px); background-size:4px 4px; opacity:.5; }
  .applogo { position:absolute; top:12px; left:14px; display:flex; align-items:center; gap:7px; z-index:3; }
  .applogo .ic { width:26px; height:26px; border-radius:8px; background:linear-gradient(180deg,#ffe27a,#e0a000); color:#3a2c00; font-weight:900; font-size:15px; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 8px rgba(0,0,0,.4); }
  .applogo b { color:#f6e7b5; font-size:13px; font-weight:800; letter-spacing:.5px; }
  .balcard { position:absolute; top:58px; left:50%; transform:translateX(-50%); width:236px; text-align:center; z-index:2;
    background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:12px 10px 14px; box-shadow:0 10px 26px rgba(0,0,0,.35); }
  .balcard .lbl { color:#a9f0c8; font-size:10px; letter-spacing:3px; font-weight:800; text-transform:uppercase; }
  .bal { color:#fff; font-size:44px; font-weight:900; letter-spacing:.5px; text-shadow:0 3px 10px rgba(0,0,0,.5); }
  .bal.bump { animation:bbump .45s ease; }
  @keyframes bbump { 0%{transform:scale(1)} 45%{transform:scale(1.16); color:#ffe27a} 100%{transform:scale(1)} }
  .chipfly { position:absolute; left:50%; top:120px; width:34px; height:34px; border-radius:50%; z-index:5; opacity:0;
    background:radial-gradient(circle at 35% 30%, #ffe27a, #e0a000); border:3px dashed #fff6cf; box-shadow:0 4px 10px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:900; color:#5a3d00; }
  .chipfly.go { animation:fly 1.2s ease forwards; }
  @keyframes fly { 0%{opacity:0; transform:translate(-50%,30px) scale(.6)} 25%{opacity:1} 100%{opacity:0; transform:translate(-50%,-58px) scale(1.1)} }
  .cards { position:absolute; top:172px; left:0; right:0; display:flex; justify-content:center; z-index:2; }
  .pcard { width:56px; height:80px; margin:0 -6px; border-radius:8px; background:#fdfdfb; box-shadow:0 8px 16px rgba(0,0,0,.45); position:relative; font-weight:800;
    animation:cdeal .4s cubic-bezier(.2,.9,.25,1.4) both; }
  @keyframes cdeal { 0%{opacity:0; transform:translateY(-30px) rotate(8deg)} 100%{opacity:1; transform:none} }
  .pcard .r { position:absolute; top:6px; left:7px; font-size:16px; line-height:1; }
  .pcard .s { position:absolute; bottom:6px; right:7px; font-size:16px; line-height:1; transform:rotate(180deg); }
  .pcard .big { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:28px; }
  .red{color:#d4202b} .blk{color:#1c1c1c}
  .winflash { position:absolute; inset:0; background:radial-gradient(circle at 50% 42%, rgba(124,252,158,.4), transparent 60%); opacity:0; z-index:1; }
  .winflash.go { animation:wf 1.1s ease; }
  @keyframes wf { 0%,100%{opacity:0} 35%{opacity:1} }
  .winbadge { position:absolute; top:150px; left:50%; transform:translateX(-50%); z-index:5; color:#0a3; font-weight:900; font-size:22px; opacity:0;
    background:#eafff1; padding:4px 14px; border-radius:20px; box-shadow:0 6px 16px rgba(0,0,0,.4); }
  .winbadge.go { animation:wb 1.6s ease forwards; }
  @keyframes wb { 0%{opacity:0; transform:translate(-50%,8px) scale(.8)} 18%{opacity:1; transform:translate(-50%,0) scale(1)} 82%{opacity:1} 100%{opacity:0} }

  /* shared overlays */
  .sticker { position:absolute; top:50%; right:12px; transform:translateY(-50%); z-index:6;
    background:rgba(0,0,0,.66); color:#ffd34d; font-size:11px; font-weight:800; padding:5px 10px; border-radius:20px; border:1px solid rgba(255,211,77,.5); white-space:nowrap; }
  .caption { position:absolute; left:18px; right:18px; top:52.5%; z-index:7; text-align:center; pointer-events:none; }
  .caption b { display:inline-block; background:#fff; color:#13131a; font-size:20px; font-weight:900; line-height:1.22; padding:8px 13px; border-radius:11px;
    box-shadow:0 8px 22px rgba(0,0,0,.55); transform:rotate(-2deg); opacity:0; }
  .caption b em { font-style:normal; color:#e8421f; }
  .caption b.show { animation:cap .55s cubic-bezier(.2,.9,.3,1.6) forwards; }
  @keyframes cap { 0%{opacity:0; transform:rotate(-2deg) scale(.6)} 60%{transform:rotate(-2deg) scale(1.08)} 100%{opacity:1; transform:rotate(-2deg) scale(1)} }
  .splitline { position:absolute; left:0; right:0; top:50%; height:2px; background:rgba(255,255,255,.14); z-index:5; box-shadow:0 0 10px rgba(0,0,0,.4); }
  .progress { position:absolute; top:0; left:0; height:4px; background:linear-gradient(90deg,#ffe27a,#ffd34d); width:0; z-index:9; box-shadow:0 0 10px rgba(255,211,77,.9); }
  .disc { position:absolute; left:0; right:0; bottom:0; z-index:9; text-align:center; font-size:8px; letter-spacing:.3px; color:rgba(255,255,255,.72); background:rgba(0,0,0,.5); padding:3px 4px; }

  /* end card */
  #end { position:absolute; inset:0; z-index:12; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px;
    background:radial-gradient(ellipse at 50% 40%, rgba(18,80,50,.96), rgba(3,16,11,.98)); opacity:0; pointer-events:none; transition:opacity .45s; }
  #end.show { opacity:1; }
  #end .ic { width:74px; height:74px; border-radius:20px; background:linear-gradient(180deg,#ffe27a,#e0a000); color:#3a2c00; font-weight:900; font-size:38px; display:flex; align-items:center; justify-content:center; box-shadow:0 12px 34px rgba(0,0,0,.55); animation:icfloat 2.4s ease-in-out infinite; }
  @keyframes icfloat { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
  #end h2 { color:#fff; font-size:24px; font-weight:900; letter-spacing:.5px; } #end h2 span{color:#ffd34d}
  #end .stars { color:#ffd34d; font-size:14px; letter-spacing:2px; } #end .stars small{ color:rgba(255,255,255,.7); font-size:11px; letter-spacing:0; margin-left:6px; }
  #end .cta { margin-top:8px; background:linear-gradient(180deg,#41d97a,#1f9e4f); color:#fff; font-weight:900; font-size:18px; text-transform:uppercase; letter-spacing:.5px;
    padding:15px 44px; border-radius:40px; box-shadow:0 6px 0 #146e38, 0 12px 24px rgba(0,0,0,.45); animation:cpulse 1.1s ease-in-out infinite; }
  @keyframes cpulse { 0%,100%{transform:scale(1); box-shadow:0 6px 0 #146e38,0 12px 24px rgba(0,0,0,.45),0 0 0 0 rgba(65,217,122,.6)} 50%{transform:scale(1.06); box-shadow:0 6px 0 #146e38,0 12px 28px rgba(0,0,0,.45),0 0 0 16px rgba(65,217,122,0)} }
  #end .small { color:rgba(255,255,255,.72); font-size:12px; }
  .confetti { position:absolute; top:-12px; width:8px; height:13px; z-index:11; opacity:0; }
  .replay { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); z-index:13; color:rgba(255,255,255,.45); font-size:11px; }
</style>
</head>
<body>
<div id="stage"><div id="board"><div id="shake">

  <div class="progress" id="prog"></div>

  <div id="top">
    <div id="topbg"></div>
    <div class="ringlight"></div>
    <div class="rec"><span class="dot"></span>REC <span id="tc">0:00</span></div>
    <div class="live2">● LIVE</div>
    <div class="avatar" id="avatar">😮</div>
    <div class="handle">@casual.player <span class="v">✔</span></div>
    <div class="wave"><i style="height:6px"></i><i style="height:12px"></i><i style="height:8px"></i><i style="height:14px"></i><i style="height:7px"></i><i style="height:11px"></i><i style="height:5px"></i></div>
    <div class="vo in"><span id="vo">…</span></div>
  </div>

  <div id="bot">
    <div class="applogo"><span class="ic">♠</span><b>VANTAGE 21</b></div>
    <div class="balcard"><div class="lbl">Your balance</div><div class="bal" id="bal">$0.00</div></div>
    <div class="chipfly" id="chip">+$</div>
    <div class="winbadge" id="winbadge">BLACKJACK · 21!</div>
    <div class="cards" id="cards"></div>
    <div class="winflash" id="winflash"></div>
  </div>

  <div class="splitline"></div>
  <div class="sticker" id="sticker">⏱ just opened it…</div>
  <div class="caption"><b id="cap"></b></div>
  <div class="vignette"></div>
  <div class="grain"></div>
  <div class="disc">Dramatization. 18+ only. Play responsibly. Winnings are not typical or guaranteed.</div>

  <div id="end">
    <div class="ic">♠</div>
    <h2>VANTAGE <span>21</span></h2>
    <div class="stars">★★★★★ <small>4.8 · Free</small></div>
    <div class="small">Try it free — just 5 minutes.</div>
    <div class="cta">Play Now</div>
    <div class="small">Tap the link 🔗</div>
  </div>

  <div class="replay">↻ tap to replay</div>

</div></div></div>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  function fit(){ var s=$('stage'); var k=Math.min(s.clientWidth/405, s.clientHeight/720); $('board').style.transform='scale('+k+')'; }
  window.addEventListener('resize', fit); fit();

  var SUIT={S:{c:'♠',k:'blk'},H:{c:'♥',k:'red'},D:{c:'♦',k:'red'},C:{c:'♣',k:'blk'}};
  function card(rank,su,i){ var s=SUIT[su]; return '<div class="pcard '+s.k+'" style="animation-delay:'+(i*0.08)+'s"><span class="r">'+rank+'</span><span class="big">'+s.c+'</span><span class="s">'+s.c+'</span></div>'; }

  var beats = [
    { t:0,     tc:'0:00', face:'😮', vo:"No way this just hit my balance in like 4 mins…", cap:'i only opened this to kill 5 mins <em>😳</em>', bal:6.5,  sticker:"⏱ just opened it…", cards:['10S','6H'] },
    { t:3000,  tc:'0:03', face:'🤔', vo:"Ok let me actually focus, I'm not even good at these.", cap:'not even a <em>"gamer"</em> lol', bal:24,   sticker:"⏱ 1 min in…", cards:['10S','6H'] },
    { t:7000,  tc:'0:07', face:'😲', vo:"Wait — did that just go UP??", cap:'the number went <em>UP?? 📈</em>', bal:88,   sticker:"⏱ 2 min in…", cards:['10S','6H','5C'], chip:'+$64' },
    { t:12000, tc:'0:12', face:'😏', vo:"Ok this is actually kinda addicting, look at this.", cap:'told myself <em>"one more round" 💀</em>', bal:176, sticker:"⏱ 3 min in…", cards:['AS','KD'], chip:'+$88' },
    { t:18000, tc:'0:18', face:'😂', vo:"That's a real balance. Like that's MY balance rn.", cap:"that's a <em>REAL balance 👀</em>", bal:312, sticker:"⏱ 4 min in…", cards:['AS','KD'], win:true },
    { t:23000, tc:'0:23', face:'🙂', vo:"Just try it for like 5 mins, I'm telling you.", cap:'link in bio <em>🔗</em>', bal:312, sticker:"⏱ 4 min in…", cards:['AS','KD'], end:true }
  ];
  var END = 28000, timers=[], balCur=0, balTarget=0, balRAF=null;

  function setBal(){ $('bal').textContent = '$' + balCur.toFixed(2); }
  function animBal(){ if(balRAF) cancelAnimationFrame(balRAF);
    (function step(){ var d=balTarget-balCur; if(Math.abs(d)<0.5){ balCur=balTarget; setBal(); return; } balCur+=d*0.1; setBal(); balRAF=requestAnimationFrame(step); })(); }
  function pulse(el, cls){ el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); }

  function applyBeat(b){
    $('tc').textContent=b.tc;
    var av=$('avatar'); av.textContent=b.face; pulse(av,'pop');
    $('vo').textContent=b.vo; pulse(document.querySelector('.vo'),'in');
    var cap=$('cap'); cap.innerHTML=b.cap; pulse(cap,'show');
    $('sticker').textContent=b.sticker;
    $('cards').innerHTML=b.cards.map(function(c,i){ return card(c.slice(0,-1), c.slice(-1), i); }).join('');
    balTarget=b.bal; animBal();
    if(b.chip){ pulse($('bal'),'bump'); var ch=$('chip'); ch.textContent=b.chip; pulse(ch,'go'); }
    if(b.win){ pulse($('winflash'),'go'); pulse($('winbadge'),'go'); pulse($('bal'),'bump'); burst(); }
    if(b.end){ $('end').classList.add('show'); endConfetti(); }
  }

  function burst(){ // small sparkle confetti in the gameplay panel
    var bot=$('bot'); var cols=['#ffd34d','#7CFC9E','#fff','#5ac8ff'];
    for(var i=0;i<16;i++){ var d=document.createElement('div'); d.className='confetti';
      d.style.left=(30+Math.random()*40)+'%'; d.style.top='40%'; d.style.background=cols[i%cols.length];
      d.style.opacity='1'; d.style.transition='all .9s ease'; bot.appendChild(d);
      (function(el){ setTimeout(function(){ el.style.transform='translate('+(Math.random()*160-80)+'px,'+(Math.random()*120-20)+'px) rotate('+(Math.random()*360)+'deg)'; el.style.opacity='0'; },20);
        setTimeout(function(){ el.remove(); },1000); })(d);
    }
  }
  function endConfetti(){ var es=$('end'); var cols=['#ffd34d','#41d97a','#ff6b6b','#5ac8ff','#fff'];
    for(var i=0;i<28;i++){ var c=document.createElement('div'); c.className='confetti'; c.style.left=(Math.random()*100)+'%'; c.style.background=cols[i%cols.length];
      c.style.opacity='1'; c.style.transition='all '+(1.4+Math.random()*1.2)+'s ease'; es.appendChild(c);
      (function(el){ setTimeout(function(){ el.style.transform='translateY(740px) rotate('+(Math.random()*720)+'deg)'; el.style.opacity='0'; },20);
        setTimeout(function(){ el.remove(); },2800); })(c);
    }
  }

  function perfNow(){ return (window.performance&&performance.now)?performance.now():0; }
  function progress(){ var start=perfNow(); (function tick(){ var p=Math.min(1,(perfNow()-start)/END); $('prog').style.width=(p*100)+'%'; if(p<1) timers.push(setTimeout(tick,60)); })(); }

  function play(){
    timers.forEach(clearTimeout); timers=[]; $('end').classList.remove('show'); $('prog').style.width='0';
    balCur=0; balTarget=0; setBal();
    beats.forEach(function(b){ timers.push(setTimeout(function(){ applyBeat(b); }, b.t)); });
    progress();
    timers.push(setTimeout(play, END+2800));
  }
  document.addEventListener('click', play);
  window.addEventListener('load', function(){ setTimeout(play, 300); });
})();
</script>
</body>
</html>
